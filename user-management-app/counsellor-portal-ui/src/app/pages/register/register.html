<div class="container">

<div class="card">

<h2>Register Counsellor</h2>

<input
placeholder="Name"
[(ngModel)]="counsellor.name">

<br><br>

<input
placeholder="Email"
[(ngModel)]="counsellor.email">

<br><br>

<input
type="password"
placeholder="Password"
[(ngModel)]="counsellor.password">

<br><br>

<input
placeholder="Contact"
[(ngModel)]="counsellor.contact">

<br><br>

<input
placeholder="Address"
[(ngModel)]="counsellor.address">

<br><br>

<button (click)="register()">Register</button>

<br><br>

<a routerLink="/">Back to Login</a>

</div>

</div>
