<div class="container">
  <div class="card">

    <h2>📝 User Registration</h2>

    <form (ngSubmit)="registerUser()">

      <!-- NAME -->
      <div class="form-group">
        <label>Name</label>
        <input type="text" [(ngModel)]="name" name="name" required />
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" required />
      </div>

      <!-- COUNTRY -->
      <div class="form-group">
        <label>Country</label>
        <select [(ngModel)]="selectedCountry" name="country" (change)="onCountryChange()">
          <option value="">-- Select Country --</option>
          <option *ngFor="let c of countries">{{ c }}</option>
        </select>
      </div>

      <!-- STATE -->
      <div class="form-group" *ngIf="states.length">
        <label>State</label>
        <select [(ngModel)]="selectedState" name="state" (change)="onStateChange()">
          <option value="">-- Select State --</option>
          <option *ngFor="let s of states">{{ s }}</option>
        </select>
      </div>

      <!-- CITY -->
      <div class="form-group" *ngIf="cities.length">
        <label>City</label>
        <select [(ngModel)]="selectedCity" name="city">
          <option value="">-- Select City --</option>
          <option *ngFor="let c of cities">{{ c }}</option>
        </select>
      </div>

      <!-- SUBMIT -->
      <button type="submit">🚀 Register</button>

    </form>

    <!-- MESSAGE -->
    <p class="message">{{ message }}</p>

  </div>
</div>
